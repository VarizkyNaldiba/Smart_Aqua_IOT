board = esp32doit-devkit-v1
framework = arduino
monitor_speed = 115200
monitor_port = COM5
upload_speed = 115200

lib_deps =
    milesburton/DallasTemperature@^3.11.0
    paulstoffregen/OneWire@^2.3.7
    bblanchon/ArduinoJson@^7.0.4
